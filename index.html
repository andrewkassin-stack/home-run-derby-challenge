    extend: {

<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  .bg-glow-red { background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(227,24,55,.14) 0%, transparent 70%); }
  ::-webkit-scrollbar { display: none; }
  .no-scroll { scrollbar-width: none; }

  /* ESPN links */
  .plink { color: inherit; text-decoration: none; border-bottom: 1px dotted rgba(255,214,91,.35); transition: color .15s, border-color .15s; }
  .plink:hover { color: #ffd65b; border-bottom-color: #ffd65b; }
  .counting .plink:hover { color: #fff; }
  .espn-badge { font-size: 8px; font-weight: 800; padding: 1px 4px; border-radius: 3px; margin-left: 3px; background: rgba(227,24,55,.15); color: #ff6b47; white-space: nowrap; }

  /* Detail panel */
  .detail-panel { display: none; }
  .detail-panel.open { display: block; }
  .chevron-open { transform: rotate(180deg); }

  /* Registry panel */
  .reg-body { display: none; }
  .reg-body.open { display: block; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin .7s linear infinite; }

  /* Live ping */
  @keyframes ping { 75%,100% { transform: scale(2); opacity: 0; } }
  .live-ping { animation: ping 1.5s cubic-bezier(0,0,.2,1) infinite; }

  /* Left rank accent */
  .rank-accent-gold   { border-left: 3px solid #ffd65b; }
  .rank-accent-silver { border-left: 3px solid #b0b8c4; }
  .rank-accent-bronze { border-left: 3px solid #cd7f32; }

  /* Season table */
  .stbl { width:100%; border-collapse:collapse; font-size:11px; }
  .stbl th { padding:6px 8px; background:#17202e; color:#6878a0; font-size:9px; letter-spacing:.05em; text-transform:uppercase; text-align:center; font-weight:700; white-space:nowrap; }
  .stbl th:first-child { text-align:left; }
  .stbl td { padding:6px 8px; border-bottom:1px solid rgba(255,255,255,.04); text-align:center; color:#6878a0; }
  .stbl td.pn { text-align:left; color:#dae3f7; font-weight:500; }
  .stbl tr.score-row td { background:rgba(255,214,91,.07); color:#ffd65b; font-weight:700; border-top:1px solid rgba(255,214,91,.15); }
  .stbl .cell-counts { background:rgba(255,214,91,.12); color:#ffd65b; font-weight:700; border-radius:3px; padding:1px 4px; }
  .stbl .cell-zero { color:rgba(104,120,160,.3); }
</style>
</head>
<body class="bg-surface text-on-surface font-body">

<!-- ═══ FIXED HEADER ═══ -->
<header class="fixed top-0 w-full z-50 bg-gradient-to-r from-[#060e1c] via-[#0d1830] to-[#060e1c] border-b-[3px] border-primary-container shadow-[0_4px_24px_rgba(227,24,55,.18)] bg-glow-red">

    <div class="flex items-center gap-3">
      <div class="h-12 w-12 rounded-xl bg-white flex items-center justify-center p-1 shadow-lg flex-shrink-0 overflow-hidden">
        <img src="Logo.jpeg" alt="HRD Logo" class="h-full w-full object-contain">
      </div>
      <h1 class="text-lg font-headline font-black text-white uppercase tracking-tight leading-none">
        <span class="text-primary-container">HOMERUN</span><br>CHALLENGE
      </h1>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex flex-col items-end">
        <div class="flex items-center gap-1.5">
          <span class="relative flex h-2 w-2">
            <span class="live-ping absolute inline-flex h-full w-full rounded-full bg-primary-container opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-primary-container"></span>
          </span>
          <span class="text-[10px] font-black uppercase tracking-widest text-primary-container">LIVE</span>
        </div>
        <span id="last-updated" class="text-[10px] text-slate-400 tabular-nums">—</span>
      </div>
      <button id="refresh-btn" class="p-2 rounded-xl bg-surface-container-highest text-on-surface active:scale-95 transition-transform disabled:opacity-40">
        <span class="material-symbols-outlined text-[20px]">refresh</span>
      </button>
    </div>
  </div>
</header>

<main class="pt-[72px] pb-20">

  <!-- ═══ STATS STRIP ═══ -->
  <div id="stats-strip" class="flex overflow-x-auto no-scroll gap-3 px-4 py-4 -mb-1">
    <!-- populated by renderStatsStrip() -->
    <div class="min-w-[150px] flex-shrink-0 bg-surface-container-low border-l-4 border-primary-container p-3 rounded-r-lg animate-pulse">
      <div class="h-2 bg-surface-container-highest rounded w-20 mb-2"></div>
      <div class="h-5 bg-surface-container-highest rounded w-24"></div>
    </div>
    <div class="min-w-[150px] flex-shrink-0 bg-surface-container-low border-l-4 border-primary-container p-3 rounded-r-lg animate-pulse">
      <div class="h-2 bg-surface-container-highest rounded w-20 mb-2"></div>
      <div class="h-5 bg-surface-container-highest rounded w-24"></div>
    </div>
    <div class="min-w-[150px] flex-shrink-0 bg-surface-container-low border-l-4 border-primary-container p-3 rounded-r-lg animate-pulse">

      <div class="h-5 bg-surface-container-highest rounded w-24"></div>
    </div>
  </div>

  </div>

  <nav id="month-nav" class="sticky top-[72px] z-40 bg-surface/90 backdrop-blur-md py-2 px-4 border-b border-white/5">
    <div class="flex gap-2 overflow-x-auto no-scroll">

</main>

<!-- ═══ BOTTOM NAV ═══ -->

// CACHE
// ═══════════════════════════════════════════════════════
function cGet(k,ttl){try{const r=localStorage.getItem(k);if(!r)return null;const{ts,d}=JSON.parse(r);return Date.now()-ts>ttl?null:d}catch{return null}}
function cSet(k,d){try{localStorage.setItem(k,JSON.stringify({ts:Date.now(),d}))}catch{}}

// MLB API
// ═══════════════════════════════════════════════════════
async function jFetch(url){const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}

async function resolveAllPlayers(forceRefresh){
  if(!forceRefresh){const c=cGet(CACHE_IDS,TTL_IDS);if(c)return c}
  const result={};
  const uniqueNames=[...new Set(Object.values(ROSTERS).flat())];
  const needApi=[];
  for(const name of uniqueNames){
    if(PLAYER_REGISTRY[name]) result[name]={...PLAYER_REGISTRY[name],source:'registry'};
    else needApi.push(name);
  }
  if(needApi.length){
    setDetail(`Looking up ${needApi.length} players via MLB API…`);
    let people=[];
    try{
      const data=await jFetch(`${API}/sports/1/players?season=${SEASON}&fields=people,id,firstName,lastName,fullName,currentTeam`);
      people=data.people||[];
    }catch(e){console.warn('Player list fetch failed',e)}
    const byLast={};
    people.forEach(p=>{
      const last=(p.lastName||'').toLowerCase().trim();
      if(!byLast[last])byLast[last]=[];
      byLast[last].push(p);
      const parts=(p.fullName||'').split(' ');
      if(parts.length>2){
        const compound=parts.slice(1).join(' ').toLowerCase();
        if(compound!==last){if(!byLast[compound])byLast[compound]=[];byLast[compound].push(p);}
      }
    });
    for(const name of needApi){
      const key=name.toLowerCase().trim();
      const cands=byLast[key]||[];
      const d=DISAMBIG[name];
      let matched=null;
      if(cands.length===1){matched=cands[0];}
      else if(cands.length>1 && d){
        if(d.first) matched=cands.find(p=>(p.firstName||'').toLowerCase().startsWith(d.first.toLowerCase()));
        if(!matched && d.team){matched=cands.find(p=>{const tn=(p.currentTeam?.name||'').toLowerCase();const ta=(p.currentTeam?.abbreviation||'').toLowerCase();return ta===d.team.toLowerCase()||tn.includes(d.team.toLowerCase());});}
        if(!matched) matched=cands[0];
      } else if(cands.length>1){matched=cands[0];}
      if(matched){result[name]={id:matched.id,full:matched.fullName||`${matched.firstName||''} ${matched.lastName||''}`.trim(),team:matched.currentTeam?.abbreviation||matched.currentTeam?.name||'?',source:'api'};}
      else{result[name]={id:null,full:name,team:'?',source:'notfound'};}
    }
  }
  cSet(CACHE_IDS,result);
  return result;
}

async function fetchMonthlyStats(id){
  const d=await jFetch(`${API}/people/${id}/stats?stats=byMonth&group=hitting&season=${SEASON}`);
  const out={};
  (d.stats?.[0]?.splits||[]).forEach(s=>{const m=parseInt(s.month||0);if(m)out[m]=(out[m]||0)+(s.stat?.homeRuns||0);});
  return out;
}

async function fetchAllStats(resolution, forceRefresh){
  if(!forceRefresh){const c=cGet(CACHE_STATS,TTL_STATS);if(c)return c}
  const ids=[...new Set(Object.values(resolution).filter(r=>r.id).map(r=>r.id))];
  const out={};
  let done=0;
  const BATCH=10;
  for(let i=0;i<ids.length;i+=BATCH){
    await Promise.all(ids.slice(i,i+BATCH).map(async id=>{
      try{out[id]=await fetchMonthlyStats(id)}catch{out[id]={}}
      setDetail(`Fetching stats ${++done}/${ids.length}…`);
    }));
  }
  cSet(CACHE_STATS,out);
  return out;
}

// ═══════════════════════════════════════════════════════
// ESPN
// ═══════════════════════════════════════════════════════
function normName(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}

async function resolveESPN(resolution){
  const cached=cGet(CACHE_ESPN,TTL_ESPN);
  if(cached) return cached;
  const espnMap={};
  try{
    setDetail('Loading ESPN player data…');
    const data=await jFetch(`${ESPN_API}/athletes?limit=1000&active=true`);
    const items=data.items||data.athletes||[];
    items.forEach(p=>{
      const raw=p.fullName||p.displayName||'';
      if(!raw) return;
      const key=normName(raw);
      const slug=key.replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      espnMap[key]={espnId:String(p.id),espnName:raw,espnUrl:`https://www.espn.com/mlb/player/_/id/${p.id}/${slug}`};
    });
  }catch(e){console.warn('ESPN bulk fetch failed:',e.message);}
  const needed=Object.values(resolution).filter(r=>r.id&&!espnMap[normName(r.full)]);
  if(needed.length){
    setDetail(`ESPN: searching ${needed.length} remaining players…`);
    const BATCH=8;
    for(let i=0;i<needed.length;i+=BATCH){
      await Promise.all(needed.slice(i,i+BATCH).map(async res=>{
        try{
          const q=encodeURIComponent(res.full);
          const data=await jFetch(`${ESPN_API}/athletes?search=${q}&limit=10`);
          const items=data.items||data.athletes||[];
          const match=items.find(p=>normName(p.fullName||p.displayName)===normName(res.full))
                    ||items.find(p=>normName(p.displayName||'').includes(normName(res.full.split(' ').pop())))
                    ||items[0];
          if(match){
            const raw=match.fullName||match.displayName||'';
            const slug=normName(raw).replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
            espnMap[normName(res.full)]={espnId:String(match.id),espnName:raw,espnUrl:`https://www.espn.com/mlb/player/_/id/${match.id}/${slug}`};
          }
        }catch{}
      }));
    }
  }
  cSet(CACHE_ESPN,espnMap);
  return espnMap;
}

function playerLink(rosterName,cssClass=''){
  const res=gResolution[rosterName]||{};
  const espn=gESPN[normName(res.full)]||{};
  const displayName=espn.espnName||res.full||rosterName;
  if(espn.espnUrl) return `<a href="${espn.espnUrl}" target="_blank" rel="noopener" class="plink ${cssClass}" title="View on ESPN">${displayName}</a>`;
  return `<span class="${cssClass}">${displayName}</span>`;
}

// ═══════════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════════
function calcPeriod(players,resolution,stats,monthNums){
  const entries=players.map(name=>{const id=resolution[name]?.id;const hrs=id?monthNums.reduce((s,m)=>s+(stats[id]?.[m]||0),0):0;return{name,hrs};});
  entries.sort((a,b)=>b.hrs-a.hrs);
  const top10=new Set(entries.slice(0,TOP_N).map(e=>e.name));
  const score=entries.slice(0,TOP_N).reduce((s,e)=>s+e.hrs,0);
  return{score,entries,top10};
}

function calcStandings(resolution,stats){
  return Object.entries(ROSTERS).map(([team,players])=>{
    const periods=MONTHS.map(mo=>calcPeriod(players,resolution,stats,mo.months));
    const total=periods.reduce((s,p)=>s+p.score,0);
    return{team,periods,total};
  }).sort((a,b)=>b.total-a.total||a.team.localeCompare(b.team));
}

function setDetail(msg){const e=document.getElementById('load-detail');if(e)e.textContent=msg;}

function initials(name){
  const res=gResolution[name]||{};
  const full=res.full||name;
  const parts=full.split(' ').filter(w=>w.length>0);
  if(parts.length===1) return parts[0][0]||'?';
  return (parts[0][0]+(parts[parts.length-1][0]||'')).toUpperCase();
}

function buildDetail(cell,row){
  const players=ROSTERS[row.team];
  const pdata=players.map(name=>{
    const id=gResolution[name]?.id;
    const mHrs=MONTHS.map(mo=>mo.months.reduce((s,m)=>s+(gStats[id]?.[m]||0),0));
    return{name,mHrs,total:mHrs.reduce((s,v)=>s+v,0)};
  });

  const inner=document.createElement('div');
  inner.className='p-4';

  const tabs=document.createElement('div');
  tabs.className='flex gap-2 overflow-x-auto no-scroll pb-3';

  const content=document.createElement('div');

  const tabDefs=[
    {id:'all',label:'Season'},
    ...MONTHS.map(m=>({id:m.id,label:m.col}))
  ];

  function showTab(id){
    tabs.querySelectorAll('button').forEach(b=>{
      const active=b.dataset.id==id;
      b.className=`flex-shrink-0 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest transition-colors ${active?'bg-primary-container text-white':'bg-surface-container-high text-slate-400'}`;
    });
    content.innerHTML='';
    if(id==='all'){content.appendChild(buildSeasonTable(pdata,row.periods));}
    else{const mi=MONTHS.findIndex(m=>m.id===id);content.appendChild(buildMonthView(pdata,mi,row.periods[mi]));}
  }

  tabDefs.forEach(t=>{
    const btn=document.createElement('button');
    btn.dataset.id=t.id;
    btn.textContent=t.label;
    btn.onclick=()=>showTab(t.id);
    tabs.appendChild(btn);
  });

  inner.appendChild(tabs);
  inner.appendChild(content);
  cell.appendChild(inner);
  showTab('all');
}

// ═══════════════════════════════════════════════════════
// SEASON TABLE
// ═══════════════════════════════════════════════════════
function buildSeasonTable(pdata,periods){
  const sorted=[...pdata].sort((a,b)=>b.total-a.total);
  const top10ByMonth=MONTHS.map((_,mi)=>{
    const ranked=[...pdata].sort((a,b)=>b.mHrs[mi]-a.mHrs[mi]);
    return new Set(ranked.slice(0,TOP_N).map(p=>p.name));
  });
  const wrap=document.createElement('div');
  wrap.className='overflow-x-auto';
  let html=`<table class="stbl"><thead><tr>
    <th>Player</th>
    ${MONTHS.map(m=>`<th>${m.col}</th>`).join('')}
    <th>Total</th>
  </tr></thead><tbody>`;
  sorted.forEach(p=>{
    html+=`<tr><td class="pn">${playerLink(p.name)}</td>`;
    p.mHrs.forEach((h,mi)=>{
      const counts=top10ByMonth[mi].has(p.name);
      if(h===0) html+=`<td class="cell-zero">—</td>`;
      else if(counts) html+=`<td><span class="cell-counts">${h}★</span></td>`;
      else html+=`<td>${h}</td>`;
    });
    html+=`<td><strong class="text-secondary tabular-nums">${p.total||'—'}</strong></td></tr>`;
  });
  html+=`<tr class="score-row"><td>Top-10 Score</td>${periods.map(p=>`<td class="tabular-nums">${p.score}</td>`).join('')}<td class="tabular-nums">${periods.reduce((s,p)=>s+p.score,0)}</td></tr>`;
  html+=`</tbody></table>`;
  wrap.innerHTML=html;
  return wrap;
}

    gStats=await fetchAllStats(gResolution,forceRefresh);
    gESPN=await resolveESPN(gResolution);
    gStandings=calcStandings(gResolution,gStats);

    document.getElementById('last-updated').textContent=
      new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

    renderStatsStrip();
    renderStandings();
    renderRegistry();
    document.getElementById('reg-panel').style.display='';
  }catch(err){
    document.getElementById('standings-mount').innerHTML=`
      <div class="mx-4 bg-primary-container/10 border border-primary-container/30 rounded-xl p-6 text-center">
        <p class="text-primary-container font-bold mb-3">⚠ ${err.message}</p>
        <button onclick="loadData(true)" class="px-4 py-2 bg-primary-container text-white rounded-lg text-sm font-black uppercase tracking-widest">Try Again</button>
      </div>`;
  }finally{
    btn.disabled=false;
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function openRegistry(){
  const panel=document.getElementById('reg-panel');
  const body=document.getElementById('reg-body');
  const chevron=document.getElementById('reg-chevron');
  panel.style.display='';
  body.classList.add('open');
  chevron.classList.add('chevron-open');
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

// Month nav
document.querySelectorAll('.month-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const val=btn.dataset.period;
    gSelectedPeriod=val===''?null:parseInt(val);
    document.querySelectorAll('.month-btn').forEach(b=>{
      const active=b===btn;
      b.className=`month-btn flex-shrink-0 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-colors ${active?'bg-primary-container text-white shadow-sm shadow-primary-container/30':'bg-surface-container-high text-slate-400'}`;
    });
    if(gStandings.length) renderStandings();
  });
});

// Registry toggle
document.getElementById('reg-toggle').addEventListener('click',()=>{
  const body=document.getElementById('reg-body');
  const chevron=document.getElementById('reg-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('chevron-open');
});

// Refresh button
document.getElementById('refresh-btn').addEventListener('click',()=>loadData(true));

loadData();
</script>
</body>
